<style>
body {
  display: grid;
  background: black;
}

#chart {
  width: 720px;
  height: 480px;
  position: relative;
  place-self: center;
  /* background: #eee; */
  /* box-shadow: 0 0 0 1px gray; */
}

.mark {
  width: 16px;
  height: 16px;
  position: absolute;
  translate: -50% -100%;
  /* opacity: .75; */
  rotate: 15deg;
  animation-name: spin;
  animation-timing-function: ease-in-out;
  animation-direction: alternate;
  animation-iteration-count: infinite;
  /* animation-duration: 2s; */
  display: flex;
  justify-content: center;
  align-items: center;
  transform-origin: center bottom;
}

/* .mark::after {
  content: "";
  display: block;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  flex-shrink: 0;
} */

@keyframes spin {
  to {
    rotate: 20deg;
  }
}

</style>

<div id="chart"></div>

<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm"

let team//  = "SAS";

// Load data
let players = await d3.csv('players-2025-26-regular-season.csv', d3.autoType);

console.log(players.length);

// Filter by 10+ games played
players = players.filter(d => d.GP >= 10);

console.log(players.length);

// Sort by points
players.sort((a, b) => a.PTS - b.PTS);

// Sort by team
if (team) {
  players.sort((a, b) => a.TEAM_ABBREVIATION === team ? 1 : -1 );
}

// Get min and max values for weight
const extentWeight = d3.extent(players, d => d.PLAYER_WEIGHT);

// Get min and max values for height
const extentHeight = d3.extent(players, d => d.PLAYER_HEIGHT_INCHES);

// Get min and max values for points
const extentPoints = d3.extent(players, d => d.PTS);

const extentAge = d3.extent(players, d => d.AGE);

// Create x scale function
const scaleX = d3.scaleLinear().domain([150,320]).range([0,100]);

// Create y scale function
const scaleY = d3.scaleLinear().domain([66,90]).range([100, 0]);

// Create mark width scale function
const scaleWidth = d3.scaleLinear().domain(extentWeight).range([2,10]);

// Create mark height scale function
const scaleHeight = d3.scaleLinear().domain(extentHeight).range([10,50]);

// 
const scaleColor = d3.scaleLinear().domain(extentPoints).range([.2,1]);

//
const scaleSpeed = d3.scaleLinear().domain(extentAge).range([1, 4]);

chart.style.background = d3.interpolateMagma(0.05);

for (let player of players) {

  if (player.PLAYER_WEIGHT === "null" || player.PLAYER_HEIGHT_INCHES === "null") {
    console.log('Skipping', player);
    continue;
  }

  const mark = document.createElement("div");
  mark.classList.add("mark");
  mark.title = player.PLAYER_NAME;
  mark.style.left = scaleX(player.PLAYER_WEIGHT) + '%';
  mark.style.top = scaleY(player.PLAYER_HEIGHT_INCHES) + '%';

  mark.style.width = scaleWidth(player.PLAYER_WEIGHT) + 'px';
  mark.style.height = scaleHeight(player.PLAYER_HEIGHT_INCHES) + 'px';
  mark.style.animationDuration = scaleSpeed(player.AGE) + 's';
  
  if (team) {
    if (player.TEAM_ABBREVIATION === team) {
      mark.style.background = d3.interpolateMagma(scaleColor(player.PTS));
    } else {
      mark.style.background = d3.interpolateMagma(0.1);
      mark.style.opacity = .5;
      mark.style.pointerEvents = "none";
    }
  } else {
    mark.style.background = d3.interpolateMagma(scaleColor(player.PTS));
  }

  chart.append(mark);
}
</script>
